version: '3.8'

services:
  # Backend Service - FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: clinicalmind-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist vector store data
      - vectorstore_data:/app/data/vectorstore
      # Persist uploaded documents
      - uploaded_docs:/app/data/raw
      # Mount configs
      - ./configs:/app/configs:ro
    networks:
      - clinicalmind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinicalmind-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - clinicalmind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis - For caching and rate limiting (optional)
  redis:
    image: redis:7-alpine
    container_name: clinicalmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clinicalmind-network
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  vectorstore_data:
    driver: local
  uploaded_docs:
    driver: local
  redis_data:
    driver: local

networks:
  clinicalmind-network:
    driver: bridge
