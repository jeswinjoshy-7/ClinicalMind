name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov flake8 black mypy
      
      - name: Lint with flake8
        run: |
          flake8 backend/ src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Check code format with Black
        run: |
          black --check backend/ src/
        continue-on-error: true
      
      - name: Type checking with mypy
        run: |
          mypy backend/ src/ --ignore-missing-imports
        continue-on-error: true
      
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=backend --cov=src --cov-report=xml
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
        continue-on-error: true

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint
        continue-on-error: true
      
      - name: Type check with TypeScript
        run: |
          cd frontend
          npx tsc --noEmit
        continue-on-error: true
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --passWithNoTests
        continue-on-error: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install security tools
        run: |
          pip install bandit safety pip-audit
      
      - name: Run Bandit security scan
        run: |
          bandit -r backend/ src/ -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Run pip-audit
        run: |
          pip-audit --format json > pip-audit-report.json || true
        continue-on-error: true
      
      - name: Run safety check
        run: |
          safety check --json > safety-report.json || true
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: clinicalmind-backend:latest
          cache-from: type=registry,ref=clinicalmind-backend:buildcache
          cache-to: type=inline
      
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: clinicalmind-frontend:latest
      
      - name: Test docker-compose
        run: |
          docker-compose config

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan, docker-build]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          echo "Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          
          if [[ "${{ needs.test-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.test-frontend.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi
